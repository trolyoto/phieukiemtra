<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Phiếu Kiểm Tra Gầm</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
padding:20px;
}

.container{
width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:30px;
}

.row{
display:flex;
gap:10px;
margin-bottom:10px;
}

.row label{
width:150px;
font-weight:bold;
}

.row input,
.row textarea,
.row select{
flex:1;
padding:6px;
border:1px solid #ccc;
border-radius:6px;
}

textarea{
height:70px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

th{
font-weight:bold;
}

thead th:nth-child(1){
background:#facc15;
}

thead th:nth-child(2){
background:#fde68a;
}

thead th:nth-child(3){
background:#ea580c;
color:white;
text-align:center;
}

thead th:nth-child(4){
background:#c7d2fe;
text-align:center;
}

thead th:nth-child(5){
background:#22c55e;
color:white;
text-align:center;
}

td textarea{
width:100%;
border:1px solid #ccc;
border-radius:6px;
padding:5px;
height:40px;
}

.checkbox{
text-align:center;
}

.sign{
margin-top:50px;
display:flex;
justify-content:space-between;
}

.sign div{
text-align:center;
width:40%;
}

</style>

</head>

<body>

<div class="container">

</html>
