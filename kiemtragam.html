<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Phiếu Kiểm Tra Gầm</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:20px;
}

.container{
width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:30px;
}

.row{
display:flex;
gap:10px;
margin-bottom:10px;
}

.row label{
width:130px;
font-weight:bold;
}

.row input,textarea{
flex:1;
padding:6px;
border:1px solid #ccc;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
font-size:13px;
}

th,td{
border:1px solid #ccc;
padding:6px;
}

th{
font-weight:bold;
}

thead th:nth-child(1){background:#facc15;}
thead th:nth-child(2){background:#fde68a;}

thead th:nth-child(6){
background:#ea580c;
color:white;
text-align:center;
}

thead th:nth-child(7){
background:#c7d2fe;
text-align:center;
}

thead th:nth-child(8){
background:#22c55e;
color:white;
text-align:center;
}

.sl{
width:40px;
text-align:center;
}

.price{
width:90px;
text-align:center;
}

.totalcol{
width:110px;
text-align:center;
}

.checkbox{
text-align:center;
}

textarea{
height:40px;
width:100%;
}

.sign{
margin-top:40px;
display:flex;
justify-content:space-between;
}

.total{
margin-top:20px;
font-size:18px;
font-weight:bold;
color:#e11d48;
}

</style>

</head>

<body>

<div class="container">

<h1>PHIẾU KIỂM TRA GẦM</h1>

<div class="row">
<label>Ngày nhận xe</label>
<input type="date">

<label>Cố vấn DV</label>
<input type="text">
</div>

<div class="row">
<label>Ngày giao xe</label>
<input type="date">

<label>KTV</label>
<input type="text">
</div>

<div class="row">
<label>Tên KH</label>
<input type="text">

<label>Loại xe</label>
<input type="text">
</div>

<div class="row">
<label>Biển số</label>
<input type="text">

<label>Số km</label>
<input type="text">
</div>

<div class="row">
<label>Ghi chú</label>
<textarea></textarea>
</div>

<h3>Yêu cầu ban đầu của khách hàng</h3>
<textarea style="height:70px"></textarea>


<table>

<thead>

<tr>

<th>Hạng mục kiểm tra</th>
<th>Hiện trạng kiểm tra - khuyến nghị</th>

<th class="sl">SL</th>
<th class="price">Đơn giá</th>
<th class="totalcol">Thành tiền</th>

<th>Thay</th>
<th>Lưu Ý</th>
<th>Tốt</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

<div class="total">
Tổng báo giá: <span id="tong">0</span> VNĐ
</div>

<div class="sign">

<div>
<b>Khách hàng</b>
<br><br><br><br>
(Ký và ghi rõ họ tên)
</div>

<div>
<b>Kỹ thuật viên</b>
<br><br><br><br>
(Ký và ghi rõ họ tên)
</div>

</div>

</div>


<script>

const items=[

["1. HỆ THỐNG TREO TRƯỚC",
["1. Giảm xóc trước","2. Lò xo trước","3. Bát bèo giảm xóc","4. Càng A trên","5. Càng A dưới"]],

["2. ROTUYN & KHỚP LÁI",
["6. Rotuyn lái trong","7. Rotuyn lái ngoài","8. Rotuyn càng A"]],

["3. THANH CÂN BẰNG",
["9. Rotuyn thanh cân bằng","10. Cao su thanh cân bằng","11. Thanh cân bằng"]],

["4. HỆ THỐNG LÁI",
["12. Thước lái","13. Khớp trục lái","14. Đường ống dầu trợ lực"]],

["5. HỆ THỐNG TRUYỀN ĐỘNG",
["15. Láp truyền động","16. Chụp bụi láp","17. Cát đăng láp"]],

["6. HỆ THỐNG PHANH",
["18. Đĩa phanh","19. Má phanh","20. Heo phanh","21. Đường ống dầu phanh"]],

["7. KHUNG GẦM",
["22. Cao su gầm","23. Bu lông – ốc gầm","24. Khung phụ (Subframe)","25. Dây cáp phanh tay","26. Che gầm / bảo vệ gầm"]]

];

let html="";

items.forEach(group=>{

html+=`<tr>
<td colspan="8" style="background:#e5e7eb;font-weight:bold">${group[0]}</td>
</tr>`;

group[1].forEach(name=>{

html+=`

<tr>

<td>${name}</td>

<td><textarea></textarea></td>

<td class="sl">
<input type="number" value="1" style="width:35px">
</td>

<td class="price">
<input type="number" class="dongia">
</td>

<td class="totalcol thanhtien">0</td>

<td class="checkbox"><input type="checkbox"></td>

<td class="checkbox"><input type="checkbox"></td>

<td class="checkbox"><input type="checkbox"></td>

</tr>

`;

});

});

document.getElementById("tableBody").innerHTML=html;



document.addEventListener("input",function(){

let tong=0;

document.querySelectorAll("tbody tr").forEach(row=>{

let sl=row.querySelector("input[type=number]");

let gia=row.querySelector(".dongia");

let total=row.querySelector(".thanhtien");

if(sl && gia && total){

let value=sl.value*gia.value;

total.innerText=value;

tong+=value;

}

});

document.getElementById("tong").innerText=tong.toLocaleString();

});

</script>

</body>
</html>
