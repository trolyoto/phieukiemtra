<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Phiếu Kiểm Tra Gầm - Phi Long Auto</title>

<style>

body{
font-family:Arial;
background:#eef2f6;
padding:20px;
}

.container{
width:1000px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:10px;
}

.logo{
text-align:center;
font-size:14px;
color:#555;
margin-bottom:20px;
}

.row{
display:flex;
gap:10px;
margin-bottom:10px;
}

.row label{
width:150px;
font-weight:bold;
}

.row input{
flex:1;
padding:6px;
border:1px solid #ccc;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
margin-top:15px;
}

th,td{
border:1px solid #ccc;
padding:6px;
}

th{font-weight:bold;}

.header1{background:#facc15;}
.header2{background:#fde68a;}
.header3{background:#ea580c;color:white;text-align:center;}
.header4{background:#c7d2fe;text-align:center;}
.header5{background:#22c55e;color:white;text-align:center;}

.price1{background:#cfd7ea;text-align:center;}
.price2{background:#27ae60;color:white;text-align:center;}
.price3{background:#163a63;color:white;text-align:center;}

textarea{
width:100%;
height:36px;
border:1px solid #ccc;
border-radius:6px;
}

.checkbox{
text-align:center;
}

.section{
background:#e5e7eb;
font-weight:bold;
}

input[type=number]{
width:70px;
padding:4px;
}

.totalbox{
margin-top:20px;
text-align:right;
font-size:18px;
font-weight:bold;
color:#d00000;
}

.sign{
margin-top:40px;
display:flex;
justify-content:space-between;
}

.sign div{
width:40%;
text-align:center;
}

button{
margin-top:15px;
padding:10px 18px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1e4ed8;
}

/* PRINT A4 */

@media print{

button{display:none;}

.container{
box-shadow:none;
width:100%;
}

body{
background:white;
}

}

</style>
</head>


<body>

<div class="container">

<h1>PHIẾU KIỂM TRA GẦM</h1>

<div class="logo">
PHI LONG AUTO • CARDIY SERVICE SYSTEM
</div>

<div class="row">
<label>Ngày nhận xe</label>
<input type="date">

<label>Cố vấn DV</label>
<input type="text">
</div>

<div class="row">
<label>Ngày giao xe</label>
<input type="date">

<label>KTV</label>
<input type="text">
</div>

<div class="row">
<label>Tên khách</label>
<input type="text">

<label>Loại xe</label>
<input type="text">
</div>

<div class="row">
<label>Biển số</label>
<input type="text">

<label>Số km</label>
<input type="text">
</div>


<table>

<thead>

<tr>

<th class="header1">HẠNG MỤC</th>
<th class="header2">HIỆN TRẠNG</th>

<th class="header3">THAY</th>
<th class="header4">LƯU Ý</th>
<th class="header5">TỐT</th>

<th class="price1">SL</th>
<th class="price2">ĐƠN GIÁ</th>
<th class="price3">THÀNH TIỀN</th>
<th class="price3">XÁC NHẬN</th>

</tr>

</thead>

<tbody id="tablebody">

</tbody>

</table>

<div class="totalbox">
TỔNG BÁO GIÁ: <span id="tong">0</span> VNĐ
</div>

<div class="sign">

<div>
<b>Khách hàng</b>
<br><br><br>
(Ký và ghi rõ họ tên)
</div>

<div>
<b>Kỹ thuật viên</b>
<br><br><br>
(Ký và ghi rõ họ tên)
</div>

</div>

<button onclick="window.print()">IN / XUẤT PDF</button>

</div>



<script>

const items=[

["1. HỆ THỐNG TREO TRƯỚC",
"Giảm xóc trước",
"Lò xo trước",
"Bát bèo giảm xóc",
"Càng A trên",
"Càng A dưới"],

["2. ROTUYN & KHỚP LÁI",
"Rotuyn lái trong",
"Rotuyn lái ngoài",
"Thước lái",
"Cao su thước lái"],

["3. THANH CÂN BẰNG",
"Thanh cân bằng",
"Rotuyn cân bằng",
"Cao su thanh cân bằng"],

["4. HỆ THỐNG TREO SAU",
"Giảm xóc sau",
"Lò xo sau",
"Càng A sau",
"Rotuyn sau"],

["5. HỆ THỐNG PHANH",
"Má phanh trước",
"Má phanh sau",
"Đĩa phanh",
"Dầu phanh"],

["6. TRUYỀN ĐỘNG",
"Trục láp",
"Cao su láp",
"Khớp láp"],

["7. KHUNG GẦM",
"Gầm xe",
"Cao su chân máy",
"Bu lông khung gầm"]

]


const tbody=document.getElementById("tablebody")

let index=1

items.forEach(section=>{

let tr=document.createElement("tr")
tr.className="section"
tr.innerHTML=`<td colspan="9">${section[0]}</td>`
tbody.appendChild(tr)

for(let i=1;i<section.length;i++){

let row=document.createElement("tr")

row.innerHTML=`

<td>${index}. ${section[i]}</td>

<td><textarea></textarea></td>

<td class="checkbox"><input type="checkbox"></td>
<td class="checkbox"><input type="checkbox"></td>
<td class="checkbox"><input type="checkbox"></td>

<td><input type="number" value="1" class="sl"></td>

<td><input type="number" class="dongia"></td>

<td class="thanhtien">0</td>

<td class="checkbox"><input type="checkbox"></td>

`

tbody.appendChild(row)

index++

}

})


function tinhTien(){

let tong=0

document.querySelectorAll("tbody tr").forEach(row=>{

let sl=row.querySelector(".sl")
let gia=row.querySelector(".dongia")

if(sl && gia){

let tt=sl.value*gia.value

row.querySelector(".thanhtien").innerText=tt

tong+=tt

}

})

document.getElementById("tong").innerText=tong.toLocaleString()

}


document.addEventListener("input",tinhTien)

</script>

</body>
</html>
