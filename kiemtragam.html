<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Phiếu Kiểm Tra Gầm - Phi Long Auto</title>

<style>

body{
font-family:Arial;
background:#eef2f6;
padding:20px;
}

.container{
width:1100px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.topbar{
text-align:center;
margin-bottom:20px;
}

.topbar button{
padding:10px 16px;
background:#16a34a;
border:none;
color:white;
border-radius:6px;
margin:5px;
cursor:pointer;
}

.topbar button:hover{
background:#15803d;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.header h1{
font-size:30px;
font-style:italic;
}

.header img{
height:70px;
}

.info{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.row{
display:flex;
margin-bottom:8px;
}

.row label{
width:130px;
font-weight:bold;
}

.row input{
flex:1;
border:none;
border-bottom:1px dotted black;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
font-size:13px;
}

th,td{
border:1px solid #ccc;
padding:6px;
}

.header1{background:#facc15}
.header2{background:#fde68a}
.header3{background:#ea580c;color:white;text-align:center}
.header4{background:#c7d2fe;text-align:center}
.header5{background:#22c55e;color:white;text-align:center}

.price1{background:#cfd7ea;text-align:center}
.price2{background:#27ae60;color:white;text-align:center}
.price3{background:#163a63;color:white;text-align:center}

.section{
background:#e5e7eb;
font-weight:bold;
}

textarea{
width:100%;
height:34px;
border:none;
}

input[type=number]{
width:70px;
}

.checkbox{
text-align:center;
}

.totalbox{
text-align:right;
font-size:20px;
font-weight:bold;
color:red;
margin-top:20px;
}

.sign{
margin-top:40px;
display:flex;
justify-content:space-between;
}

.sign div{
width:40%;
text-align:center;
}

button.print{
background:#2563eb;
margin-top:15px;
}

@media print{

.topbar{display:none}
.print{display:none}

.container{
box-shadow:none;
width:100%;
}

body{
background:white;
}

}

</style>

</head>


<body>

<div class="container">

<div class="topbar">

<button onclick="window.location='index.html'">Trang chủ</button>

<button onclick="window.location='tracuu.html'">
Tra cứu thông tin xe
</button>

<button class="print" onclick="window.print()">
In Phiếu
</button>

</div>


<div class="header">

<h1>PHIẾU KIỂM TRA GẦM</h1>

<img src="logo.png">

</div>

<hr>


<div class="info">

<div>

<div class="row">
<label>Họ tên</label>
<input id="hoten">
</div>

<div class="row">
<label>Điện thoại</label>
<input id="phone">
</div>

<div class="row">
<label>Ngày nhận xe</label>
<input type="datetime-local">
</div>

</div>


<div>

<div class="row">
<label>Loại xe</label>
<input id="car">
</div>

<div class="row">
<label>Biển số</label>
<input id="plate">
</div>

<div class="row">
<label>Số km</label>
<input id="km">
</div>

</div>

</div>



<table>

<thead>

<tr>

<th class="header1">HẠNG MỤC</th>
<th class="header2">HIỆN TRẠNG</th>

<th class="header3">THAY</th>
<th class="header4">LƯU Ý</th>
<th class="header5">TỐT</th>

<th class="price1">SL</th>
<th class="price2">ĐƠN GIÁ</th>
<th class="price3">THÀNH TIỀN</th>
<th class="price3">XÁC NHẬN</th>

</tr>

</thead>

<tbody id="tablebody"></tbody>

</table>



<div class="totalbox">

TỔNG BÁO GIÁ:
<span id="tong">0</span> VNĐ

</div>



<div class="sign">

<div>

<b>Khách hàng</b>
<br><br><br>
(Ký tên)

</div>

<div>

<b>Kỹ thuật viên</b>
<br><br><br>
(Ký tên)

</div>

</div>

</div>



<script>

const items=[

["1. HỆ THỐNG TREO TRƯỚC",
"Giảm xóc trước",
"Lò xo trước",
"Bát bèo giảm xóc",
"Càng A trên",
"Càng A dưới"],

["2. ROTUYN & KHỚP LÁI",
"Rotuyn lái trong",
"Rotuyn lái ngoài",
"Thước lái",
"Cao su thước lái"],

["3. THANH CÂN BẰNG",
"Thanh cân bằng",
"Rotuyn cân bằng",
"Cao su thanh cân bằng"],

["4. HỆ THỐNG TREO SAU",
"Giảm xóc sau",
"Lò xo sau",
"Càng A sau",
"Rotuyn sau"],

["5. HỆ THỐNG PHANH",
"Má phanh trước",
"Má phanh sau",
"Đĩa phanh",
"Dầu phanh"],

["6. TRUYỀN ĐỘNG",
"Trục láp",
"Cao su láp",
"Khớp láp"],

["7. KHUNG GẦM",
"Gầm xe",
"Cao su chân máy",
"Bu lông khung gầm"]

]


const tbody=document.getElementById("tablebody")

let index=1

items.forEach(section=>{

let tr=document.createElement("tr")
tr.className="section"
tr.innerHTML=`<td colspan="9">${section[0]}</td>`
tbody.appendChild(tr)

for(let i=1;i<section.length;i++){

let row=document.createElement("tr")

row.innerHTML=`

<td>${index}. ${section[i]}</td>

<td><textarea></textarea></td>

<td class="checkbox"><input type="checkbox"></td>

<td class="checkbox"><input type="checkbox"></td>

<td class="checkbox"><input type="checkbox"></td>

<td><input type="number" value="1" class="sl"></td>

<td><input type="number" class="dongia"></td>

<td class="thanhtien">0</td>

<td class="checkbox"><input type="checkbox"></td>

`

tbody.appendChild(row)

index++

}

})



function formatMoney(n){

return Number(n).toLocaleString("vi-VN")

}



function tinhTien(){

let tong=0

document.querySelectorAll("tbody tr").forEach(row=>{

let sl=row.querySelector(".sl")
let gia=row.querySelector(".dongia")

if(sl && gia){

let tt=sl.value*gia.value

row.querySelector(".thanhtien").innerText=formatMoney(tt)

tong+=tt

}

})

document.getElementById("tong").innerText=formatMoney(tong)

}

document.addEventListener("input",tinhTien)

</script>


</body>
</html>
